services:
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.25
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/config/passwd:/mosquitto/config/passwd:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - rag_default

  dashboard:
    build: .
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2.0
    env_file: .env
    volumes:
      - dashboard_data:/app/data
    depends_on:
      - mosquitto
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - rag_default
    labels:
      - traefik.enable=true
      - traefik.http.routers.home.rule=Host(`home.altijwal.com`)
      - traefik.http.routers.home.tls=true
      - traefik.http.routers.home.entrypoints=web,websecure
      - traefik.http.services.home.loadbalancer.server.port=8000

volumes:
  mosquitto_data:
  mosquitto_log:
  dashboard_data:

networks:
  rag_default:
    external: true
