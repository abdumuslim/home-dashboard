<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="house" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- House Outline -->
  <path d="M 80,240 L 256,96 L 432,240 V 400 A 16,16 0 0 1 416,416 L 96,416 A 16,16 0 0 1 80,400 Z" 
        fill="none" stroke="url(#house)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Leaf icon inside -->
  <path d="M 256,336 C 256,336 192,280 192,232 C 192,184 256,160 256,160 C 256,160 320,184 320,232 C 320,280 256,336 256,336 Z" 
        fill="url(#leaf)"/>
  <path d="M 256,336 V 248" fill="none" stroke="#020617" stroke-width="16" stroke-linecap="round"/>
</svg>
